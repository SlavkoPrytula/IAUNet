# @package _global_
dataset:
  name: EVICAN2_Easy
  type: EVICAN2

  data_root: /project/project_465001327/datasets/EVICAN2/coco
  # data_root: /gpfs/space/projects/PerkinElmer/cytoplasm_segmentation/datasets/EVICAN2/coco

  train_dataset:
    images: ${dataset.data_root}/images/EVICAN_train2019
    ann_file: ${dataset.data_root}/annotations/EVICAN2/processed/instances_train2019_EVICAN2_cell.json
    size: [512, 512]
    batch_size: 8
    augmentation: lsj
    return_masks: true
    return_bboxes: true
    return_labels: true
    filter_empty: true
    min_bbox_size: 1.0
    use_crowd: false

  # valid_dataset:
  #   images: ${dataset.data_root}/images/EVICAN_val2019
  #   ann_file: ${dataset.data_root}/annotations/EVICAN2/processed/instances_val2019_EVICAN2_cell.json
  #   size: [512, 512]
  #   batch_size: 8

  valid_dataset:
    images: ${dataset.data_root}/images/EVICAN_eval2019
    ann_file: ${dataset.data_root}/annotations/EVICAN2/processed/instances_eval2019_easy_EVICAN2_cell.json
    size: [512, 512]
    batch_size: 8
    return_masks: true
    return_bboxes: true
    return_labels: true

  eval_dataset:
    images: ${dataset.data_root}/images/EVICAN_eval2019
    ann_file: ${dataset.data_root}/annotations/EVICAN2/processed/instances_eval2019_easy_EVICAN2_cell.json
    size: [512, 512]
    batch_size: 8
    return_masks: true
    return_bboxes: true
    return_labels: true

  mean: [114.83, 114.83, 114.83]
  std: [15.455, 15.455, 15.455]

  # mean: [124, 124, 124]
