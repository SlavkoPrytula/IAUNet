# @package _global_
defaults:
  - v2/iaunet-base.yaml
  - _self_

model:
  model_name: iaunet-swin-s-p4-w7-224

  encoder: 
    type: SwinTransformer
    embed_dim: 96
    depths: [2, 2, 18, 2]
    num_heads: [3, 6, 12, 24]
    window_size: 7
    mlp_ratio: 4
    qkv_bias: True
    drop_path_rate: 0.3
    patch_norm: True
    pretrained: True
    out_indices: [0, 1, 2, 3]
    pretrain_img_size: 224

  decoder: 
    # pixel decoder config.
    type: iadecoder_ml_fpn/experimental/deep_supervision

    # transformer decoder config.
    num_queries: 100
    num_classes: 1
    hidden_dim: 256
    nheads: 8
    dec_layers: 1
    dropout: 0.1
    pre_norm: false
    dim_feedforward: 1024