criterion:
  type: SparseCriterion
  losses:
    - labels
    - masks
  weights:
    labels: 2.0
    bce_masks: 5.0
    dice_masks: 2.0
    iou_masks: 2.0
    no_object_weight: 0.1
  matcher:
    type: PointSampleHungarianMatcher
    cost_cls: 2.0
    cost_dice: 2.0
    cost_mask: 5.0
    cost_bbox: 1.0
    cost_giou: 2.0
  num_classes: 1

evaluator:
  type: MMDetDataloaderEvaluator
  mask_thr: 0.5
  score_thr: 0.05
  nms_thr: 0.5
  metric: segm
  classwise: true
  outfile_prefix: results/coco

optimizer:
  type: AdamW
  lr: 0.0001
  weight_decay: 0.05

scheduler:
  type: CosineAnnealingLR
  eta_min: 1.0e-06
  T_max: 16000
  verbose: false